name: CI

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  pull_request:

permissions:
  contents: read

env:
  GO_VERSION: '1.22'
  NODE_VERSION: '22'
  GOLANGCI_LINT_VERSION: v1.64.8
  NFPM_VERSION: v2.46.3

jobs:
  fmt:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install just
        run: |
          sudo apt-get update
          sudo apt-get install -y just
      - run: npm ci --prefix web
      - run: just fmt-check

  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install just and golangci-lint
        run: |
          sudo apt-get update
          sudo apt-get install -y curl just
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b "$HOME/go/bin" "${GOLANGCI_LINT_VERSION}"
          echo "$HOME/go/bin" >> "$GITHUB_PATH"
      - run: npm ci --prefix web
      - run: just lint

  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install just
        run: |
          sudo apt-get update
          sudo apt-get install -y just
      - run: npm ci --prefix web
      - run: just test

  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install just
        run: |
          sudo apt-get update
          sudo apt-get install -y just
      - run: npm ci --prefix web
      - run: just build

  linux-release:
    name: linux release (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            goarch: amd64
            package_arch: amd64
            nfpm_arch: x86_64
            file_machine: x86-64
            archlinux_image: archlinux:latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            goarch: arm64
            package_arch: arm64
            nfpm_arch: arm64
            file_machine: aarch64
            archlinux_image: menci/archlinuxarm:base
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y curl file just
      - run: npm ci --prefix web
      - name: Build frontend
        run: npm --prefix web run build
      - name: Build release binaries
        env:
          GOARCH: ${{ matrix.goarch }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          binary_dir="dist/bin-${TARGET}"
          archive_dir="archive/websudo-${TARGET}"
          mkdir -p "$binary_dir" "$archive_dir/packaging/systemd" "$archive_dir/packaging/scripts"
          for name in websudo websudo-askpass websudo-approverd; do
            GOOS=linux GOARCH="$GOARCH" go build -trimpath -o "$binary_dir/$name" "./cmd/$name"
            cp "$binary_dir/$name" "$archive_dir/$name"
          done
          cp README.md "$archive_dir/README.md"
          cp LICENSE "$archive_dir/LICENSE"
          cp packaging/systemd/*.service "$archive_dir/packaging/systemd/"
          cp packaging/scripts/* "$archive_dir/packaging/scripts/"
          tar -czf "dist/websudo-${TARGET}.tar.gz" -C archive "websudo-${TARGET}"
      - name: Verify release binaries
        env:
          TARGET: ${{ matrix.target }}
          FILE_MACHINE: ${{ matrix.file_machine }}
        run: |
          set -euo pipefail
          for binary in dist/bin-${TARGET}/websudo dist/bin-${TARGET}/websudo-askpass dist/bin-${TARGET}/websudo-approverd; do
            test -x "$binary"
            file "$binary" | grep -i "$FILE_MACHINE"
          done
      - name: Install nFPM
        env:
          NFPM_ARCH: ${{ matrix.nfpm_arch }}
        run: |
          set -euo pipefail
          nfpm_version="${NFPM_VERSION#v}"
          archive="nfpm_${nfpm_version}_Linux_${NFPM_ARCH}.tar.gz"
          curl -sSfL -o "/tmp/${archive}" "https://github.com/goreleaser/nfpm/releases/download/${NFPM_VERSION}/${archive}"
          tar -xzf "/tmp/${archive}" -C /tmp nfpm
          sudo install -m 0755 /tmp/nfpm /usr/local/bin/nfpm
          nfpm --version
      - name: Set package metadata
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            package_version="${GITHUB_REF_NAME#v}"
            package_release="1"
          else
            package_version="0.0.0"
            package_release="${GITHUB_RUN_NUMBER}"
          fi
          {
            echo "PACKAGE_VERSION=${package_version}"
            echo "PACKAGE_RELEASE=${package_release}"
          } >> "$GITHUB_ENV"
      - name: Package Linux installers
        env:
          PACKAGE_ARCH: ${{ matrix.package_arch }}
          PACKAGE_BINARY_DIR: dist/bin-${{ matrix.target }}
        run: |
          nfpm package --config nfpm.yaml --packager deb --target dist/
          nfpm package --config nfpm.yaml --packager rpm --target dist/
          nfpm package --config nfpm.yaml --packager archlinux --target dist/
      - name: Verify deb package in Debian with systemd
        run: packaging/scripts/verify-package-in-container.sh debian '${{ matrix.file_machine }}'
      - name: Verify rpm package in Fedora with systemd
        run: packaging/scripts/verify-package-in-container.sh fedora '${{ matrix.file_machine }}'
      - name: Verify Arch package in Arch Linux with systemd
        run: packaging/scripts/verify-package-in-container.sh arch '${{ matrix.file_machine }}' '${{ matrix.archlinux_image }}'
      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.target }}-release-artifacts
          path: |
            dist/websudo-${{ matrix.target }}.tar.gz
            dist/*.deb
            dist/*.rpm
            dist/*.pkg.tar.*

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [fmt, lint, test, build, linux-release]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: linux-*-release-artifacts
          path: dist
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd dist
          rm -f SHA256SUMS
          sha256sum * > SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  aur:
    if: startsWith(github.ref, 'refs/tags/v') && github.repository == 'rijuyuezhu/websudo'
    needs: release
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: linux-*-release-artifacts
          path: dist
          merge-multiple: true
      - name: Generate AUR PKGBUILD
        run: |
          package_version="${GITHUB_REF_NAME#v}"
          tarball_sha256_x86_64="$(sha256sum dist/websudo-x86_64-unknown-linux-gnu.tar.gz | cut -d ' ' -f 1)"
          tarball_sha256_aarch64="$(sha256sum dist/websudo-aarch64-unknown-linux-gnu.tar.gz | cut -d ' ' -f 1)"
          mkdir -p dist/aur
          cp packaging/aur/websudo-bin.install dist/aur/websudo-bin.install
          while IFS= read -r line; do
            line="${line//@PKGVER@/${package_version}}"
            line="${line//@TARBALL_SHA256_X86_64@/${tarball_sha256_x86_64}}"
            line="${line//@TARBALL_SHA256_AARCH64@/${tarball_sha256_aarch64}}"
            printf '%s\n' "$line"
          done < packaging/aur/PKGBUILD.template > dist/aur/PKGBUILD
      - name: Publish AUR package
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.3
        with:
          pkgname: websudo-bin
          pkgbuild: dist/aur/PKGBUILD
          test: true
          test_flags: --clean --cleanbuild --nodeps --noconfirm
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: Update websudo-bin to ${{ github.ref_name }}
          ssh_keyscan_types: rsa,ecdsa,ed25519
