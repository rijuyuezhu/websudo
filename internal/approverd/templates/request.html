<!doctype html>
<html lang="en">
<body>
  <h1>Request {{.ID}}</h1>
  <p>Status: {{.Status}}</p>
  <p>User: {{.RequestedBy.Username}}</p>
  <p>Working directory: {{.Command.Cwd}}</p>
  <pre>{{range .Command.Argv}}{{.}}
{{end}}</pre>

  <form method="post" action="/api/requests/{{.ID}}/approve">
    <label>Token <input name="token" /></label>
    <button type="submit">Approve</button>
  </form>

  <form method="post" action="/api/requests/{{.ID}}/deny">
    <label>Token <input name="token" /></label>
    <button type="submit">Deny</button>
  </form>
</body>
</html>
